# Development docker-compose with hot reload
services:
  payload-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: navoiairport-dev
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-final}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-ecce34137f3d0597a6e70f6b}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      - SHARP_IGNORE_GLOBAL_LIBVIPS=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - media_data:/app/public/media
    command: pnpm dev
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    container_name: navoiairport-db-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-final}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
  media_data:
    driver: local
